name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Gerar Cobra
        uses: Platane/snk@v3
        with:
          github_user_name: layssasuelen03-creator
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2300BFFF&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353
            dist/github-contribution-grid-snake.svg?color_snake=%2300BFFF&color_dots=%23ebedf0,%230e4429,%23006d32,%2326a641,%2339d353
  
      - name: Publicar no branch output
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}